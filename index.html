<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>A.A.A.T.I. UMC - Check-in</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.1.7/dist/signature_pad.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="holograma-container">
    <div class="scanlines"></div>
    <img src="logo1.png" alt="Logo Holográfico AAATI" class="imagem-holografica">
</div>

<div class="container">
    <div class="header">
        <h1>A.A.A.T.I.</h1>
        <div class="umc-tag">UMC - Tecnologia</div>
    </div>
    
    <form id="checkinForm">
        <label>Nome Completo</label>
        <input type="text" id="nome" placeholder="Ex: Nicolas Matsuda" required>

        <label>RGM</label>
        <input type="text" id="rgm" placeholder="Número do RGM" required>
        
        <label>Curso</label>
        <select id="curso" required>
            <option value="" disabled selected>Selecione...</option>
            <option value="ADS">Análise e Desenvolvimento de Sistemas</option>
            <option value="CC">Ciência da Computação</option>
            <option value="SI">Sistemas de Informação</option>
            <option value="ES">Engenharia de Software</option>
        </select>

        <label>Semestre</label>
        <input type="number" id="semestre" min="1" max="8" placeholder="1 a 8" required>

        <button type="button" class="btn-abrir-assinatura" id="openSignature">✍️ CLIQUE PARA ASSINAR</button>
        <div id="msgAssinado" style="display:none;">✓ Assinatura Capturada</div>

        <button type="submit" id="btnEnviar" disabled>VERIFICANDO GPS...</button>
        <div id="gpsMsg" class="status-msg">Buscando localização...</div>
    </form>
</div>

<div id="signature-overlay">
    <canvas id="signature-pad"></canvas>
    <div class="controles-assinatura">
        <button type="button" class="btn-limpar" id="clear">LIMPAR</button>
        <button type="button" class="btn-salvar" id="saveSignature">CONCLUIR</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
